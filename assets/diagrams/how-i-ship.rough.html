<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>How I ship</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    padding: 32px 28px 40px;
    background: #fffef8;
    font-family: "Segoe Print", "Comic Sans MS", "Chalkboard SE", "Hiragino Maru Gothic ProN", sans-serif;
    color: #1a1a1a;
    width: 520px;
  }
  h1 {
    text-align: center;
    font-size: 34px;
    font-weight: 700;
    margin: 0 0 6px;
    letter-spacing: -0.02em;
  }
  .tagline {
    text-align: center;
    font-size: 13px;
    color: #555;
    margin-bottom: 22px;
    line-height: 1.4;
  }
  #c {
    display: block;
    margin: 0 auto;
  }
  .footer {
    margin-top: 18px;
    text-align: center;
    font-size: 13px;
    color: #333;
    line-height: 1.5;
  }
  .footer em { font-style: normal; color: #b45309; font-weight: 600; }
</style>
</head>
<body>
  <h1>How I ship</h1>
  <p class="tagline">not a magic button · one change at a time<br/>Issue-scoped · I still own the merge</p>
  <canvas id="c" width="920" height="1480"></canvas>
  <p class="footer">
    Tools propose and critique. I verify and decide. <em>Mostly.</em><br/>
    <em>revise → Issue</em> (don’t restart the universe)
  </p>
  <script src="https://unpkg.com/roughjs@4.6.6/bundled/rough.js"></script>
  <script>
    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');
    // hi-dpi
    const dpr = 2;
    const W = 460, H = 740;
    canvas.width = W * dpr;
    canvas.height = H * dpr;
    canvas.style.width = W + 'px';
    canvas.style.height = H + 'px';
    ctx.scale(dpr, dpr);
    ctx.fillStyle = '#fffef8';
    ctx.fillRect(0, 0, W, H);

    const rc = rough.canvas(canvas);
    const steps = [
      { n: 1, phase: 'PLAN', title: 'Frame the change', sub: 'ChatGPT · wall-bounce & design', fill: '#d1fae5', stroke: '#0f766e' },
      { n: 2, phase: 'PLAN', title: 'Define scope & acceptance', sub: 'Issue · docs · criteria', fill: '#ccfbf1', stroke: '#0f766e' },
      { n: 3, phase: 'BUILD', title: 'Implement on a branch', sub: 'Claude Code · scoped only', fill: '#e0e7ff', stroke: '#4338ca' },
      { n: 4, phase: 'BUILD', title: 'Verify behavior', sub: 'tests · build · hands-on', fill: '#eef2ff', stroke: '#4338ca' },
      { n: 5, phase: 'REVIEW', title: 'Adversarial review', sub: 'Codex · diff vs Issue scope', fill: '#fef3c7', stroke: '#b45309' },
      { n: 6, phase: 'REVIEW', title: 'Human judgment', sub: 'I keep / reject findings', fill: '#ffedd5', stroke: '#b45309' },
      { n: 7, phase: 'SHIP', title: 'Open pull request', sub: 'link Issue · record decisions', fill: '#dcfce7', stroke: '#166534' },
      { n: 8, phase: 'SHIP', title: 'Human merge gate', sub: 'ChatGPT reviews · I merge or revise', fill: '#14532d', stroke: '#14532d', final: true },
    ];

    const boxX = 70, boxW = 340, boxH = 62, gap = 18;
    let y = 8;
    const centers = [];
    let lastPhase = '';

    // rough font for labels - use canvas fillText with casual font
    ctx.font = '600 15px "Segoe Print", "Comic Sans MS", "Chalkboard SE", sans-serif';

    steps.forEach((s, i) => {
      if (s.phase !== lastPhase) {
        ctx.save();
        ctx.fillStyle = s.stroke;
        ctx.font = '700 11px ui-sans-serif, system-ui, sans-serif';
        ctx.fillText(s.phase, 12, y + 18);
        ctx.restore();
        lastPhase = s.phase;
      }

      const opts = {
        roughness: 1.6,
        bowing: 1.2,
        stroke: s.stroke,
        strokeWidth: s.final ? 2.4 : 1.6,
        fill: s.fill,
        fillStyle: 'solid',
      };
      rc.rectangle(boxX, y, boxW, boxH, opts);

      // number circle
      rc.circle(boxX + 28, y + boxH / 2, 28, {
        roughness: 1.3,
        stroke: s.final ? '#bbf7d0' : s.stroke,
        strokeWidth: 1.5,
        fill: s.final ? '#bbf7d0' : s.stroke,
        fillStyle: 'solid',
      });
      ctx.fillStyle = s.final ? '#14532d' : '#fff';
      ctx.font = '700 14px ui-sans-serif, system-ui, sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(String(s.n), boxX + 28, y + boxH / 2 + 0.5);

      ctx.textAlign = 'left';
      ctx.textBaseline = 'alphabetic';
      ctx.fillStyle = s.final ? '#f0fdf4' : '#111';
      ctx.font = '700 15px ui-sans-serif, system-ui, sans-serif';
      ctx.fillText(s.title, boxX + 52, y + 26);
      ctx.fillStyle = s.final ? '#bbf7d0' : '#555';
      ctx.font = '12px ui-sans-serif, system-ui, sans-serif';
      ctx.fillText(s.sub, boxX + 52, y + 44);

      centers.push({ y, cy: y + boxH / 2, bottom: y + boxH });
      y += boxH + gap;
    });

    // forward arrows
    for (let i = 0; i < centers.length - 1; i++) {
      const x = boxX + boxW / 2;
      const y1 = centers[i].bottom + 1;
      const y2 = centers[i + 1].y - 1;
      rc.line(x, y1, x, y2 - 6, { roughness: 1.2, stroke: '#666', strokeWidth: 1.4 });
      // arrow head
      rc.linearPath([
        [x - 5, y2 - 10],
        [x, y2 - 2],
        [x + 5, y2 - 10],
      ], { roughness: 0.8, stroke: '#666', strokeWidth: 1.4 });
    }

    // revise dashed: 8 -> 2
    const c8 = centers[7], c2 = centers[1];
    const rx = boxX + boxW + 18;
    rc.line(boxX + boxW, c8.cy, rx, c8.cy, { roughness: 1.4, stroke: '#d97706', strokeWidth: 1.6, strokeLineDash: [6, 5] });
    rc.line(rx, c8.cy, rx, c2.cy, { roughness: 1.4, stroke: '#d97706', strokeWidth: 1.6, strokeLineDash: [6, 5] });
    rc.line(rx, c2.cy, boxX + boxW + 2, c2.cy, { roughness: 1.4, stroke: '#d97706', strokeWidth: 1.6, strokeLineDash: [6, 5] });
    // arrow into step 2
    rc.linearPath([
      [boxX + boxW + 10, c2.cy - 5],
      [boxX + boxW + 2, c2.cy],
      [boxX + boxW + 10, c2.cy + 5],
    ], { roughness: 0.8, stroke: '#d97706', strokeWidth: 1.6 });

    ctx.save();
    ctx.fillStyle = '#d97706';
    ctx.font = '700 11px ui-sans-serif, system-ui, sans-serif';
    ctx.translate(rx + 14, (c8.cy + c2.cy) / 2);
    ctx.rotate(Math.PI / 2);
    ctx.textAlign = 'center';
    ctx.fillText('revise → Issue', 0, 0);
    ctx.restore();

    // signal ready
    document.title = 'READY';
  </script>
</body>
</html>
