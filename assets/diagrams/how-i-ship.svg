<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 732" width="440" height="732" role="img" aria-labelledby="t d">
<title id="t">How I ship</title>
<desc id="d">Frame with ChatGPT, define Issue and acceptance, implement on a branch with Claude Code, verify, Codex adversarial review, human judgment, open PR, human merge gate. Revise returns to scope definition. Tools propose; I decide.</desc>
<rect width="440" height="732" rx="18" fill="#fafaf9"/>
<text x="220" y="36" text-anchor="middle" font-family="ui-sans-serif,system-ui,-apple-system,Segoe UI,sans-serif" font-size="22" font-weight="700" fill="#0f172a">How I ship</text>
<text x="220" y="58" text-anchor="middle" font-family="ui-sans-serif,system-ui,sans-serif" font-size="11.5" fill="#64748b">one change at a time · Issue-scoped · human owns the merge</text>
<text x="220" y="76" text-anchor="middle" font-family="ui-sans-serif,system-ui,sans-serif" font-size="11" fill="#94a3b8">not one-shot generation · deliberate steps</text>
