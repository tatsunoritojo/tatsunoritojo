<text x="220" y="696" text-anchor="middle" font-family="ui-sans-serif,system-ui,sans-serif" font-size="11.5" fill="#0f172a">Not one-shot: scope before code · verify before review · human merges</text>
<text x="220" y="716" text-anchor="middle" font-family="ui-sans-serif,system-ui,sans-serif" font-size="11" fill="#64748b">Tools propose and critique. I verify and decide.</text>
