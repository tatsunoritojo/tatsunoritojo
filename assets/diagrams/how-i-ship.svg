<text x="118" y="540" font-family="ui-sans-serif,system-ui,sans-serif" font-size="14" font-weight="700" fill="#0f172a">Open pull request</text>
<text x="118" y="558" font-family="ui-sans-serif,system-ui,sans-serif" font-size="11" fill="#64748b">link Issue · record decisions</text>
<rect x="72" y="586" width="344" height="58" rx="12" fill="#14532d" stroke="#166534" stroke-width="2.5"/>
