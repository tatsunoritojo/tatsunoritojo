<text x="118" y="208" font-family="ui-sans-serif,system-ui,sans-serif" font-size="11" fill="#64748b">Issue · docs · criteria</text>
<text x="16" y="252" font-family="ui-sans-serif,system-ui,sans-serif" font-size="10" font-weight="700" fill="#4338ca" letter-spacing="0.08em">BUILD</text>
