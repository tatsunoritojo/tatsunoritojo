<text x="118" y="610" font-family="ui-sans-serif,system-ui,sans-serif" font-size="14" font-weight="700" fill="#f0fdf4">Human merge gate</text>
<text x="118" y="628" font-family="ui-sans-serif,system-ui,sans-serif" font-size="11" fill="#bbf7d0">ChatGPT reviews · I merge or revise</text>
