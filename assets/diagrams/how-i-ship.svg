<text x="118" y="470" font-family="ui-sans-serif,system-ui,sans-serif" font-size="14" font-weight="700" fill="#0f172a">Human judgment</text>
<text x="118" y="488" font-family="ui-sans-serif,system-ui,sans-serif" font-size="11" fill="#64748b">I keep / reject findings</text>
<text x="16" y="532" font-family="ui-sans-serif,system-ui,sans-serif" font-size="10" font-weight="700" fill="#166534" letter-spacing="0.08em">SHIP</text>
