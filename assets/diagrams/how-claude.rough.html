<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@600;700&family=Patrick+Hand&display=swap" rel="stylesheet"/>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    width: 800px;
    padding: 14px 18px 6px;
    background: #fffef8;
    font-family: "Patrick Hand", "Comic Sans MS", cursive;
    color: #1c1917;
  }
  h1 {
    text-align: center;
    font-family: "Caveat", cursive;
    font-size: 38px;
    font-weight: 700;
    line-height: 1.05;
  }
  .tag {
    text-align: center;
    font-size: 13.5px;
    color: #57534e;
    margin: 3px 0 8px;
  }
  .legend {
    display: flex;
    justify-content: center;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 6px;
    font-size: 12px;
  }
  .legend span {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 3px 10px 3px 6px;
    border-radius: 999px;
    border: 1.5px solid;
  }
  .legend .claude { background: #e0e7ff; border-color: #4338ca; color: #312e81; }
  .legend .ai { background: #ccfbf1; border-color: #0f766e; color: #115e59; }
  .legend .human { background: #dcfce7; border-color: #166534; color: #14532d; }
  .legend .gh { background: #f5f5f4; border-color: #57534e; color: #292524; }
  .legend img { width: 16px; height: 16px; object-fit: contain; display: block; }
  .legend i { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
  canvas { display: block; margin: 0 auto; }
  .foot {
    text-align: center;
    font-size: 13px;
    color: #44403c;
    margin-top: 4px;
    margin-bottom: 0;
    line-height: 1.35;
  }
  .foot em { font-style: normal; color: #166534; font-weight: 700; }
</style>
</head>
<body>
  <h1>How Claude Code works here</h1>
  <p class="tag">implementer in the repository · not the product owner</p>
  <div class="legend">
    <span class="claude"><img src="logos/claude.png" alt="" width="16" height="16"/>Claude Code</span>
    <span class="ai"><img src="logos/openai.png" alt="" width="16" height="16"/>Codex</span>
    <span class="gh"><img src="logos/github.png" alt="" width="16" height="16"/>GitHub Issue / PR</span>
    <span class="human"><i style="background:#166534"></i>Human (me)</span>
  </div>
  <canvas id="c"></canvas>
  <p class="foot">Claude Code implements scoped changes.
  · <em>I own product decisions, review judgment, and merge.</em></p>
  <script src="https://unpkg.com/roughjs@4.6.6/bundled/rough.js"></script>
  <script>
    /*
      How Claude Code works here — same sketch system as How I ship / knowledge.

      Codex axis review (adopted):
        - 3-row structure (avoid full ship-loop duplicate)
        - Order aligned with How I ship: Codex before PR
        - hands-on not claimed as Claude-only
        - DOES NOT expressed as human-owned gates, not floating ban

      Structure:
        READS  → Issue · acceptance · rules · docs
        DOES   → scoped branch work · tests · build
        GATES  → Codex review → human judgment → PR · I merge
    */
    const FONT = '"Patrick Hand", "Comic Sans MS", cursive';
    const ROUGH = 1.0, BOW = 0.7;
    const INK = '#44403c';

    const colors = {
      claude: { fill: '#e0e7ff', stroke: '#4338ca', num: '#4338ca' },
      ai:     { fill: '#ccfbf1', stroke: '#0f766e', num: '#0f766e' },
      human:  { fill: '#dcfce7', stroke: '#166534', num: '#166534' },
      gate:   {
        fill: '#14532d', stroke: '#14532d',
        numBg: '#bbf7d0', numFg: '#14532d',
        title: '#f0fdf4', sub: '#bbf7d0',
      },
      plain:  { fill: '#fafaf9', stroke: '#78716c', num: '#57534e' },
    };

    // Canvas geometry — wide enough for 4-step after-implement rail
    const W = 760, H = 390;
    const dpr = 3;
    const L = 36;
    const CW = 200, CH = 72, GX = 22;

    const canvas = document.getElementById('c');
    canvas.width = W * dpr;
    canvas.height = H * dpr;
    canvas.style.width = W + 'px';
    canvas.style.height = H + 'px';
    const ctx = canvas.getContext('2d');
    ctx.scale(dpr, dpr);
    ctx.fillStyle = '#fffef8';
    ctx.fillRect(0, 0, W, H);
    const rc = rough.canvas(canvas);

    function drawCard(x, y, w, h, opts) {
      const c = opts.color;
      rc.rectangle(x, y, w, h, {
        roughness: ROUGH, bowing: BOW,
        stroke: c.stroke, strokeWidth: opts.heavy ? 2.0 : 1.4,
        fill: c.fill, fillStyle: 'solid',
      });
      // title band
      ctx.fillStyle = opts.heavy ? (c.title || '#1c1917') : '#1c1917';
      ctx.font = '700 15px ' + FONT;
      ctx.textAlign = 'left';
      ctx.textBaseline = 'alphabetic';
      ctx.fillText(opts.title, x + 14, y + 24);
      ctx.fillStyle = opts.heavy ? (c.sub || '#57534e') : '#57534e';
      ctx.font = '12.5px ' + FONT;
      const lines = opts.lines || [];
      lines.forEach((ln, i) => {
        ctx.fillText(ln, x + 14, y + 42 + i * 16);
      });
      return { x, y, w, h, cx: x + w / 2, cy: y + h / 2, x2: x + w, y2: y + h };
    }

    function line(x1, y1, x2, y2, stroke, width, dash) {
      const o = { roughness: 0.9, stroke, strokeWidth: width || 1.4 };
      if (dash) o.strokeLineDash = dash;
      rc.line(x1, y1, x2, y2, o);
    }
    function head(x, y, ang, stroke) {
      const len = 6;
      const a1 = ang + Math.PI * 0.78, a2 = ang - Math.PI * 0.78;
      rc.linearPath([
        [x + Math.cos(a1) * len, y + Math.sin(a1) * len],
        [x, y],
        [x + Math.cos(a2) * len, y + Math.sin(a2) * len],
      ], { roughness: 0.5, stroke, strokeWidth: 1.3 });
    }
    function hArrow(x1, y, x2, stroke) {
      line(x1, y, x2, y, stroke);
      head(x2, y, x2 >= x1 ? 0 : Math.PI, stroke);
    }
    function vArrow(x, y1, y2, stroke) {
      line(x, y1, x, y2, stroke);
      head(x, y2, y2 >= y1 ? Math.PI / 2 : -Math.PI / 2, stroke);
    }
    function zoneLabel(x, y, text, color) {
      ctx.fillStyle = color;
      ctx.font = '700 12px ' + FONT;
      ctx.textAlign = 'left';
      ctx.textBaseline = 'middle';
      ctx.fillText(text, x, y);
    }
    function loadImage(src) {
      return new Promise((resolve) => {
        const img = new Image();
        img.onload = () => resolve(img);
        img.onerror = () => resolve(null);
        img.src = src;
      });
    }
    function drawLogo(img, x, y, size) {
      if (!img) return;
      ctx.save();
      ctx.beginPath();
      ctx.arc(x + size / 2, y + size / 2, size / 2 + 1, 0, Math.PI * 2);
      ctx.closePath();
      ctx.clip();
      ctx.fillStyle = '#fffef8';
      ctx.fillRect(x - 1, y - 1, size + 2, size + 2);
      ctx.drawImage(img, x, y, size, size);
      ctx.restore();
      rc.circle(x + size / 2, y + size / 2, size + 4, {
        roughness: 0.8, stroke: '#d6d3d1', strokeWidth: 1.0, fill: 'transparent',
      });
    }

    async function main() {
      try {
        await Promise.all([
          document.fonts.load('700 38px Caveat'),
          document.fonts.load('600 15px Patrick Hand'),
          document.fonts.load('13px Patrick Hand'),
          document.fonts.load('700 12px Patrick Hand'),
        ]);
      } catch (e) {}

      const [logoClaude, logoOpenAI, logoGithub] = await Promise.all([
        loadImage('logos/claude.png'),
        loadImage('logos/openai.png'),
        loadImage('logos/github.png'),
      ]);

      // ---- Row 1: READS | DOES | DOES NOT OWN (as human ownership) ----
      const y1 = 28;
      const cardW = 200;
      const cardH = 88;
      const gap = 24;
      const rowW = cardW * 3 + gap * 2;
      const x0 = (W - rowW) / 2;

      zoneLabel(x0, y1 - 12, 'ROLE SPLIT', '#57534e');

      const reads = drawCard(x0, y1, cardW, cardH, {
        color: colors.plain,
        title: 'READS',
        lines: ['Issue · acceptance', 'project rules · docs'],
      });
      const does = drawCard(x0 + cardW + gap, y1, cardW, cardH, {
        color: colors.claude,
        title: 'DOES',
        lines: ['scoped branch changes', 'tests · build'],
      });
      const notOwn = drawCard(x0 + (cardW + gap) * 2, y1, cardW, cardH, {
        color: colors.human,
        title: 'DOES NOT OWN',
        lines: ['product scope', 'review judgment · merge'],
      });

      hArrow(reads.x2 + 2, reads.cy, does.x - 2, INK);
      // dashed "boundary" toward does-not-own
      line(does.x2 + 2, does.cy, notOwn.x - 2, notOwn.cy, '#a8a29e', 1.3, [5, 4]);

      const logoS = 20;
      drawLogo(logoGithub, reads.x2 - logoS - 8, reads.y + 8, logoS);
      drawLogo(logoClaude, does.x2 - logoS - 8, does.y + 8, logoS);
      // no logo on DOES NOT OWN — human

      // ---- Row 2: after implement — same order as How I ship ----
      // Codex → human judgment → Open PR (Claude) → I merge (human)
      const y2 = y1 + cardH + 56;
      zoneLabel(x0, y2 - 14, 'AFTER IMPLEMENT  (same order as How I ship)', '#57534e');

      const gW = 155, gH = 78;
      const gGap = 16;
      const gRowW = gW * 4 + gGap * 3;
      const gx0 = (W - gRowW) / 2;

      // soft rail band
      rc.rectangle(gx0 - 12, y2 - 10, gRowW + 24, 100, {
        roughness: 1.1, bowing: 0.5, stroke: 'transparent',
        fill: '#f5f5f4', fillStyle: 'solid',
      });

      const codex = drawCard(gx0, y2, gW, gH, {
        color: colors.ai,
        title: 'Codex review',
        lines: ['adversarial', 'vs Issue'],
      });
      const judge = drawCard(gx0 + gW + gGap, y2, gW, gH, {
        color: colors.human,
        title: 'Human judgment',
        lines: ['I keep or reject'],
      });
      // Open PR = Claude (not the human merge gate)
      const openPr = drawCard(gx0 + (gW + gGap) * 2, y2, gW, gH, {
        color: colors.claude,
        title: 'Open PR',
        lines: ['Claude Code', 'link Issue'],
      });
      const merge = drawCard(gx0 + (gW + gGap) * 3, y2, gW, gH, {
        color: colors.gate,
        heavy: true,
        title: 'I merge',
        lines: ['human gate only'],
      });

      hArrow(codex.x2 + 2, codex.cy, judge.x - 2, INK);
      hArrow(judge.x2 + 2, judge.cy, openPr.x - 2, INK);
      hArrow(openPr.x2 + 2, openPr.cy, merge.x - 2, '#166534');

      drawLogo(logoOpenAI, codex.x2 - logoS - 6, codex.y + 8, logoS);
      drawLogo(logoClaude, openPr.x2 - logoS - 6, openPr.y + 8, logoS);
      drawLogo(logoGithub, merge.x2 - logoS - 6, merge.y + 8, logoS);

      // DOES drops into Codex
      vArrow(does.cx, does.y2 + 2, y2 - 4, colors.claude.num);
      ctx.fillStyle = '#4338ca';
      ctx.font = '700 11px ' + FONT;
      ctx.textAlign = 'center';
      ctx.fillText('then review', does.cx + 36, (does.y2 + y2) / 2);

      // subtle note under DOES NOT OWN linking to human gates
      ctx.fillStyle = '#78716c';
      ctx.font = '11px ' + FONT;
      ctx.textAlign = 'center';
      ctx.fillText('judgment · merge ↓', notOwn.cx, notOwn.y2 + 14);

      document.title = 'READY';
    }

    if (document.fonts && document.fonts.ready) {
      document.fonts.ready.then(main);
    } else {
      main();
    }
  </script>
</body>
</html>
