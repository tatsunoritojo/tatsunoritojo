<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 766" width="420" height="766" role="img" aria-labelledby="title desc">
  <title id="title">How I ship</title>
  <desc id="desc">I frame the change, define an Issue and acceptance criteria, implement on a branch, verify behavior, run a Codex adversarial review, assess the findings myself, open a pull request, and make the final merge-or-revise decision after PR review.</desc>
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#64748b"/>
    </marker>
    <marker id="arr-rev" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#d97706"/>
    </marker>
  </defs>
  <rect width="420" height="766" rx="20" fill="#fafaf9"/>
  <text x="210" y="36" text-anchor="middle" font-family="ui-sans-serif,system-ui,-apple-system,Segoe UI,sans-serif" font-size="22" font-weight="700" fill="#0f172a">How I ship</text>
  <text x="210" y="58" text-anchor="middle" font-family="ui-sans-serif,system-ui,-apple-system,Segoe UI,sans-serif" font-size="12" fill="#64748b">my default loop · Issue-scoped · human owns the merge</text>
  <text x="32" y="106" font-family="ui-sans-serif,system-ui,sans-serif" font-size="11" font-weight="700" fill="#94a3b8" letter-spacing="0.06em">PLAN</text>
  <rect x="88" y="88" width="304" height="64" rx="12" fill="#f0fdfa" stroke="#5eead4" stroke-width="1.5"/>
  <circle cx="114" cy="120" r="14" fill="#0f766e"/>
  <text x="114" y="125" text-anchor="middle" font-family="ui-sans-serif,system-ui,sans-serif" font-size="13" font-weight="700" fill="#fff">1</text>
  <text x="136" y="114" font-family="ui-sans-serif,system-ui,sans-serif" font-size="15" font-weight="700" fill="#0f172a">Frame the change</text>
  <text x="136" y="134" font-family="ui-sans-serif,system-ui,sans-serif" font-size="11.5" fill="#64748b">ChatGPT · options & constraints</text>
  <rect x="88" y="162" width="304" height="64" rx="12" fill="#ffffff" stroke="#94a3b8" stroke-width="1.5"/>
  <circle cx="114" cy="194" r="14" fill="#475569"/>
  <text x="114" y="199" text-anchor="middle" font-family="ui-sans-serif,system-ui,sans-serif" font-size="13" font-weight="700" fill="#fff">2</text>
  <text x="136" y="188" font-family="ui-sans-serif,system-ui,sans-serif" font-size="15" font-weight="700" fill="#0f172a">Define scope & acceptance</text>
  <text x="136" y="208" font-family="ui-sans-serif,system-ui,sans-serif" font-size="11.5" fill="#64748b">Issue · docs · criteria</text>
  <text x="32" y="262" font-family="ui-sans-serif,system-ui,sans-serif" font-size="11" font-weight="700" fill="#94a3b8" letter-spacing="0.06em">BUILD</text>
  <rect x="88" y="244" width="304" height="64" rx="12" fill="#f0fdfa" stroke="#5eead4" stroke-width="1.5"/>
  <circle cx="114" cy="276" r="14" fill="#0f766e"/>
  <text x="114" y="281" text-anchor="middle" font-family="ui-sans-serif,system-ui,sans-serif" font-size="13" font-weight="700" fill="#fff">3</text>
  <text x="136" y="270" font-family="ui-sans-serif,system-ui,sans-serif" font-size="15" font-weight="700" fill="#0f172a">Implement on a branch</text>
  <text x="136" y="290" font-family="ui-sans-serif,system-ui,sans-serif" font-size="11.5" fill="#64748b">Claude Code · scoped changes</text>
  <rect x="88" y="318" width="304" height="64" rx="12" fill="#ffffff" stroke="#94a3b8" stroke-width="1.5"/>
  <circle cx="114" cy="350" r="14" fill="#475569"/>
  <text x="114" y="355" text-anchor="middle" font-family="ui-sans-serif,system-ui,sans-serif" font-size="13" font-weight="700" fill="#fff">4</text>
  <text x="136" y="344" font-family="ui-sans-serif,system-ui,sans-serif" font-size="15" font-weight="700" fill="#0f172a">Verify behavior</text>
  <text x="136" y="364" font-family="ui-sans-serif,system-ui,sans-serif" font-size="11.5" fill="#64748b">tests · build · hands-on checks</text>
  <text x="32" y="418" font-family="ui-sans-serif,system-ui,sans-serif" font-size="11" font-weight="700" fill="#94a3b8" letter-spacing="0.06em">REVIEW</text>
  <rect x="88" y="400" width="304" height="64" rx="12" fill="#f0fdfa" stroke="#5eead4" stroke-width="1.5"/>
  <circle cx="114" cy="432" r="14" fill="#0f766e"/>
  <text x="114" y="437" text-anchor="middle" font-family="ui-sans-serif,system-ui,sans-serif" font-size="13" font-weight="700" fill="#fff">5</text>
  <text x="136" y="426" font-family="ui-sans-serif,system-ui,sans-serif" font-size="15" font-weight="700" fill="#0f172a">Run adversarial review</text>
  <text x="136" y="446" font-family="ui-sans-serif,system-ui,sans-serif" font-size="11.5" fill="#64748b">Codex · diff vs scope</text>
  <rect x="88" y="474" width="304" height="64" rx="12" fill="#f0fdf4" stroke="#86efac" stroke-width="1.5"/>
  <circle cx="114" cy="506" r="14" fill="#15803d"/>
  <text x="114" y="511" text-anchor="middle" font-family="ui-sans-serif,system-ui,sans-serif" font-size="13" font-weight="700" fill="#fff">6</text>
  <text x="136" y="500" font-family="ui-sans-serif,system-ui,sans-serif" font-size="15" font-weight="700" fill="#0f172a">Apply human judgment</text>
  <text x="136" y="520" font-family="ui-sans-serif,system-ui,sans-serif" font-size="11.5" fill="#64748b">I verify findings · keep / reject</text>
  <text x="32" y="574" font-family="ui-sans-serif,system-ui,sans-serif" font-size="11" font-weight="700" fill="#94a3b8" letter-spacing="0.06em">SHIP</text>
  <rect x="88" y="556" width="304" height="64" rx="12" fill="#ffffff" stroke="#94a3b8" stroke-width="1.5"/>
  <circle cx="114" cy="588" r="14" fill="#475569"/>
  <text x="114" y="593" text-anchor="middle" font-family="ui-sans-serif,system-ui,sans-serif" font-size="13" font-weight="700" fill="#fff">7</text>
  <text x="136" y="582" font-family="ui-sans-serif,system-ui,sans-serif" font-size="15" font-weight="700" fill="#0f172a">Open the pull request</text>
  <text x="136" y="602" font-family="ui-sans-serif,system-ui,sans-serif" font-size="11.5" fill="#64748b">link Issue · record decisions</text>
  <rect x="88" y="630" width="304" height="64" rx="12" fill="#14532d" stroke="#166534" stroke-width="3"/>
  <circle cx="114" cy="662" r="14" fill="#bbf7d0"/>
  <text x="114" y="667" text-anchor="middle" font-family="ui-sans-serif,system-ui,sans-serif" font-size="13" font-weight="700" fill="#14532d">8</text>
  <text x="136" y="656" font-family="ui-sans-serif,system-ui,sans-serif" font-size="15" font-weight="700" fill="#f0fdf4">Human merge gate</text>
  <text x="136" y="676" font-family="ui-sans-serif,system-ui,sans-serif" font-size="11.5" fill="#bbf7d0">ChatGPT reviews · I merge or revise</text>
  <g stroke="#64748b" stroke-width="2" fill="none" marker-end="url(#arr)">
    <path d="M240 152 V162"/>
    <path d="M240 226 V244"/>
    <path d="M240 308 V318"/>
    <path d="M240 382 V400"/>
    <path d="M240 464 V474"/>
    <path d="M240 538 V556"/>
    <path d="M240 620 V630"/>
  </g>
  <path d="M392 662 H416 V194 H392" fill="none" stroke="#d97706" stroke-width="2" stroke-dasharray="5 4" marker-end="url(#arr-rev)"/>
  <text x="406" y="428" text-anchor="middle" transform="rotate(90 406 428)" font-family="ui-sans-serif,system-ui,sans-serif" font-size="11" font-weight="700" fill="#d97706">revise</text>
  <text x="210" y="746" text-anchor="middle" font-family="ui-sans-serif,system-ui,sans-serif" font-size="12" fill="#475569">Tools propose and critique. I verify and decide.</text>
</svg>
