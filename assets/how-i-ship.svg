<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 920" width="680" height="920" role="img" aria-labelledby="title desc">
  <title id="title">How I ship</title>
  <desc id="desc">ChatGPT designs, Claude Code implements, Codex reviews, human reviews, PR, ChatGPT decides merge or return, then repeat.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f7f4ef"/>
      <stop offset="100%" stop-color="#eef6f4"/>
    </linearGradient>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="112%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#0f172a" flood-opacity="0.08"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#64748b"/>
    </marker>
  </defs>
  <rect width="680" height="920" rx="24" fill="url(#bg)"/>
  <text x="340" y="52" text-anchor="middle" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-size="28" font-weight="700" fill="#0f172a">How I ship</text>
  <text x="340" y="82" text-anchor="middle" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-size="14" fill="#64748b">multi-agent loop · human gate on every merge</text>

  <!-- boxes -->
  <g font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" filter="url(#shadow)">
    <!-- 1 -->
    <rect x="90" y="110" width="500" height="88" rx="16" fill="#ffffff" stroke="#99f6e4" stroke-width="2"/>
    <circle cx="132" cy="154" r="20" fill="#0d9488"/>
    <text x="132" y="160" text-anchor="middle" font-size="16" font-weight="700" fill="#fff">1</text>
    <text x="170" y="148" font-size="18" font-weight="700" fill="#0f172a">ChatGPT</text>
    <text x="170" y="172" font-size="14" fill="#64748b">wall-bounce · framing · design</text>

    <!-- 2 -->
    <rect x="90" y="230" width="500" height="88" rx="16" fill="#ffffff" stroke="#a5b4fc" stroke-width="2"/>
    <circle cx="132" cy="274" r="20" fill="#4f46e5"/>
    <text x="132" y="280" text-anchor="middle" font-size="16" font-weight="700" fill="#fff">2</text>
    <text x="170" y="268" font-size="18" font-weight="700" fill="#0f172a">Claude Code</text>
    <text x="170" y="292" font-size="14" fill="#64748b">implementation</text>

    <!-- 3 -->
    <rect x="90" y="350" width="500" height="88" rx="16" fill="#ffffff" stroke="#fcd34d" stroke-width="2"/>
    <circle cx="132" cy="394" r="20" fill="#d97706"/>
    <text x="132" y="400" text-anchor="middle" font-size="16" font-weight="700" fill="#fff">3</text>
    <text x="170" y="388" font-size="18" font-weight="700" fill="#0f172a">Codex</text>
    <text x="170" y="412" font-size="14" fill="#64748b">adversarial review of the implementation</text>

    <!-- 4 -->
    <rect x="90" y="470" width="500" height="88" rx="16" fill="#ffffff" stroke="#86efac" stroke-width="2"/>
    <circle cx="132" cy="514" r="20" fill="#16a34a"/>
    <text x="132" y="520" text-anchor="middle" font-size="16" font-weight="700" fill="#fff">4</text>
    <text x="170" y="508" font-size="18" font-weight="700" fill="#0f172a">Me (Tatsunori)</text>
    <text x="170" y="532" font-size="14" fill="#64748b">review findings · keep / drop</text>

    <!-- 5 -->
    <rect x="90" y="590" width="500" height="88" rx="16" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
    <circle cx="132" cy="634" r="20" fill="#475569"/>
    <text x="132" y="640" text-anchor="middle" font-size="16" font-weight="700" fill="#fff">5</text>
    <text x="170" y="628" font-size="18" font-weight="700" fill="#0f172a">Pull request</text>
    <text x="170" y="652" font-size="14" fill="#64748b">open the change set</text>

    <!-- 6 -->
    <rect x="90" y="710" width="500" height="88" rx="16" fill="#ffffff" stroke="#99f6e4" stroke-width="2"/>
    <circle cx="132" cy="754" r="20" fill="#0d9488"/>
    <text x="132" y="760" text-anchor="middle" font-size="16" font-weight="700" fill="#fff">6</text>
    <text x="170" y="748" font-size="18" font-weight="700" fill="#0f172a">ChatGPT</text>
    <text x="170" y="772" font-size="14" fill="#64748b">PR review → send back or merge</text>
  </g>

  <!-- vertical arrows -->
  <g stroke="#64748b" stroke-width="2.5" fill="none" marker-end="url(#arrow)">
    <path d="M340 198 V230"/>
    <path d="M340 318 V350"/>
    <path d="M340 438 V470"/>
    <path d="M340 558 V590"/>
    <path d="M340 678 V710"/>
  </g>

  <!-- loop back -->
  <path d="M590 754 C 650 754, 650 154, 590 154" fill="none" stroke="#0d9488" stroke-width="2.5" stroke-dasharray="6 5" marker-end="url(#arrow)"/>
  <text x="638" y="460" text-anchor="middle" transform="rotate(90 638 460)" font-family="ui-sans-serif, system-ui, sans-serif" font-size="13" font-weight="600" fill="#0d9488">repeat</text>

  <text x="340" y="860" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="13" fill="#64748b">Tools draft and critique · I own the judgment</text>
  <text x="340" y="886" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="12" fill="#94a3b8">ChatGPT → Claude Code → Codex → Me → PR → ChatGPT</text>
</svg>
